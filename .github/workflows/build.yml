name: Build EasyLogin

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        version: [1.21.1, 1.21.11, 26.1]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Determine JDK Version
      id: jdk
      run: |
        if [[ "${{ matrix.version }}" == "26.1" ]]; then
          echo "version=25" >> $GITHUB_OUTPUT
        else
          echo "version=21" >> $GITHUB_OUTPUT
        fi
        
    - name: Set up JDK ${{ steps.jdk.outputs.version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ steps.jdk.outputs.version }}
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew :neoforge:${{ matrix.version }}:assemble --no-daemon
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EasyLogin-${{ matrix.version }}-Jars
        path: |
          **/build/libs/*.jar
          !**/build/libs/*-dev.jar
          !**/build/libs/*-sources.jar
          !**/build/libs/*-common.jar
