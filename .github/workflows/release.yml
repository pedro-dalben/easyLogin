name: Release EasyLogin

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        version: [1.21.1, 1.21.11, 26.1]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine JDK Version
        id: jdk
        run: |
          if [[ "${{ matrix.version }}" == "26.1" ]]; then
            echo "version=25" >> $GITHUB_OUTPUT
          else
            echo "version=21" >> $GITHUB_OUTPUT
          fi
          
      - name: Set up JDK ${{ steps.jdk.outputs.version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.jdk.outputs.version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Grant execute permission
        run: chmod +x gradlew
        
      - name: Switch Stonecutter
        run: ./gradlew chv ${{ matrix.version }}
        
      - name: Build
        run: ./gradlew assemble --no-daemon
        
      - name: Upload temporary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jars-${{ matrix.version }}
          path: |
            **/build/libs/*.jar
            !**/build/libs/*-dev.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-common.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-jars-*
          merge-multiple: true

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ env.VERSION }}
          files: release-artifacts/*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
